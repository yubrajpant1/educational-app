name: educational_app
description: "A Flutter educational app with offline support for courses and quizzes."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  get: ^4.6.6
  provider: ^6.0.0

  # Local Storage & Offline Support
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.1

  # Database
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.2.0

  # UI & Styling
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Date & Time
  intl: ^0.19.0

  # Utilities
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.1
  logger: ^2.0.0

  # PDF Viewer
  syncfusion_flutter_pdfviewer: ^23.2.0

  # Video Player
  video_player: ^2.8.1
  chewie: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.6
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/data/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
